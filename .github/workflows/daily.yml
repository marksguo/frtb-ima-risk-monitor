name: Daily risk update

on:
  schedule:
    # 22:30 UTC on weekdays (after the US market close in both EST and EDT).
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update
        env:
          # Free Gemini tier powers the narrative/caption; Anthropic kept as fallback.
          FRTB_LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_update.py

      - name: Commit and push changes
        run: |
          git config user.name "frtb-risk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/frtb_snapshot.sqlite DAILY_LOG.md CHANGES.md social/drafts
          # Plain-CSV return history for the Scenario Lab: committed every run so
          # the lab's baseline matches today; git deltas the one-row append.
          git add data/returns_history.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily risk update $(date -u +%F)"
            git push
          fi
